<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Media</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="TUTORIAL_CSS_2311102133_Christoba joshua hutagalung.css">
</head>
<body>

<div class="container py-4">
    <div class="header-logo">
        <h1><span class="blue">ONLINE</span> <span class="orange">MEDIA</span></h1>
    </div>

    <nav class="nav-blue">
        <div class="nav-items">
            <a href="#">HOME</a>
            <a href="#">STRATEGY</a>
            <a href="#">SOLUSI</a>
            <a href="#">MARKETING</a>
            <a href="#">WORKSHOP</a>
            <a href="#">OUR WORK</a>
            <a href="#">PRODUK</a>
            <a href="#">PARTNER</a>
            <a href="#">INSPIRASI</a>
            <a href="#">FAQ</a>
        </div>
    </nav>

    <div style="text-align: center; margin-bottom: 30px;">
        <button class="btn btn-outline-primary btn-sm" onclick="ubahRataTeks()">Ubah Posisi Teks</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="ubahWarnaBox()">Toggle Warna Box 1</button>
    </div>

    <div class="grid-section">
        <div class="row row-cols-2 g-3 justify-content-center">
            <div class="col">
                <div class="item-box bg-green" id="box-pertama">
                    <i class="fas fa-chart-pie"></i>
                    <span>Analytic</span>
                </div>
            </div>
            <div class="col">
                <div class="item-box bg-orange">
                    <i class="fas fa-thermometer-half"></i>
                    <span>Creative</span>
                </div>
            </div>
            <div class="col">
                <div class="item-box bg-red">
                    <i class="fas fa-desktop"></i>
                    <span>Development</span>
                </div>
            </div>
            <div class="col">
                <div class="item-box bg-cyan">
                    <i class="fas fa-cogs"></i>
                    <span>Marketing</span>
                </div>
            </div>
            <div class="col">
                <div class="item-box bg-amber">
                    <i class="fas fa-play-circle"></i>
                    <span>Media</span>
                </div>
            </div>
            <div class="col">
                <div class="item-box bg-lime">
                    <i class="fas fa-rocket"></i>
                    <span>Optimitation</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. Fungsi merubah alignment teks header (Center/Right)
    function ubahRataTeks() {
        let h1 = document.querySelector('.header-logo h1');
        // Logika: Jika saat ini kanan, pindah ke center. Jika bukan, pindah ke kanan.
        if (h1.style.textAlign === 'right') {
            h1.style.textAlign = 'center';
        } else {
            h1.style.textAlign = 'right';
        }
    }

    // 2. Fungsi toggle warna background box pertama
    let statusWarna = "asli";
    function ubahWarnaBox() {
        let box = document.getElementById('box-pertama');
        
        if (statusWarna === "asli") {
            box.style.backgroundColor = "#333333"; // Berubah jadi abu gelap
            statusWarna = "berubah";
        } else {
            box.style.backgroundColor = ""; // Menghapus inline style agar kembali ke warna CSS (.bg-green)
            statusWarna = "asli";
        }
    }
</script>

</body>
</html>
